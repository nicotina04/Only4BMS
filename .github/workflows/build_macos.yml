name: Build Only4BMS (macOS)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to upload to (e.g. v1.5.5). If empty, will skip release step."
        required: false
        default: ""

jobs:
  build:
    name: Build for macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: ARM
            artifact_name: Only4BMS-Mac-ARM
          - os: macos-15-intel
            arch: Intel
            artifact_name: Only4BMS-Mac-Intel
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install "numpy<2.0" torch stable-baselines3 shimmy gymnasium pyinstaller

      - name: Train AI Models
        run: |
          python src/only4bms/ai/train.py

      - name: Build .app bundle with PyInstaller
        run: |
          # Use headless version of opencv to minimize library conflicts (like libintl)
          # while still providing VideoCapture functionality needed by the game.
          pip uninstall -y opencv-python
          pip install opencv-python-headless

          pyinstaller --windowed \
                      --name Only4BMS \
                      --add-data "src/only4bms/ai/*.zip:only4bms/ai" \
                      --collect-all stable_baselines3 \
                      --collect-all torch \
                      --collect-all numpy \
                      --osx-bundle-identifier com.only4bms.app \
                      --clean \
                      src/only4bms/main.py

      - name: Ad-hoc code sign
        run: |
          codesign --force --deep --sign - dist/Only4BMS.app

      - name: Create distributable archive
        run: |
          cd dist
          zip -r -y ${{ matrix.artifact_name }}.zip Only4BMS.app
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.zip

  release:
    name: Attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name != '')
    steps:
      - name: Download all macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
          name: Only4BMS ${{ github.event.inputs.tag_name || github.ref_name }}
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
