name: Build Only4BMS (macOS)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build for macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: ARM
            artifact_name: Only4BMS-Mac-ARM
          - os: macos-15-intel
            arch: Intel
            artifact_name: Only4BMS-Mac-Intel
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller stable-baselines3 shimmy gymnasium torch

      - name: Train AI Models
        run: |
          python src/only4bms/ai/train.py

      - name: Build .app bundle with PyInstaller
        run: |
          pyinstaller --windowed \
                      --name Only4BMS \
                      --add-data "src/only4bms/ai/*.zip:only4bms/ai" \
                      --collect-all stable_baselines3 \
                      --collect-all torch \
                      --osx-bundle-identifier com.only4bms.app \
                      --clean \
                      src/only4bms/main.py

      - name: Ad-hoc code sign
        run: |
          codesign --force --deep --sign - dist/Only4BMS.app

      - name: Create distributable archive
        run: |
          cd dist
          zip -r -y ${{ matrix.artifact_name }}.zip Only4BMS.app
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.zip

  release:
    name: Attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
          name: Only4BMS ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
