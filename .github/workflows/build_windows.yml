name: Build Only4BMS (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller stable-baselines3 shimmy gymnasium torch

      - name: Train AI Models
        run: |
          python src/only4bms/ai/train.py

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile \
                      --windowed \
                      --name Only4BMS \
                      --add-data "src/only4bms/ai/*.zip;only4bms/ai" \
                      --collect-all stable_baselines3 \
                      --collect-all torch \
                      --clean \
                      src/only4bms/main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Only4BMS-Windows
          path: dist/Only4BMS.exe

  release:
    name: Attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Only4BMS-Windows
          path: ./artifacts

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
          name: Only4BMS ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
