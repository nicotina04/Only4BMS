name: Build Only4BMS (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to upload to (e.g. v1.5.5). If empty, will skip release step."
        required: false
        default: ""

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install "numpy<2.0"
          pip install pyinstaller stable-baselines3 shimmy gymnasium torch

      - name: Train AI Models
        run: |
          python src/only4bms/ai/train.py

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --onedir \
                      --windowed \
                      --name Only4BMS \
                      --add-data "src/only4bms/ai/*.zip;only4bms/ai" \
                      --collect-all stable_baselines3 \
                      --collect-all torch \
                      --collect-all numpy \
                      --clean \
                      src/only4bms/main.py

      - name: Create Installer with Inno Setup
        shell: powershell
        run: |
          # Create Inno Setup script dynamically
          $iss = @"
          [Setup]
          AppId={{617C2037-BA3D-4A42-9A4E-E4208B8E8E9F}
          AppName=Only4BMS
          AppVersion=${{ github.ref_name }}
          DefaultDirName={autopf}\Only4BMS
          DefaultGroupName=Only4BMS
          OutputDir=dist
          OutputBaseFilename=Only4BMS_Setup
          Compression=lzma
          SolidCompression=yes
          PrivilegesRequired=admin
          ; Force overwrite of existing files on upgrade
          DisableProgramGroupPage=yes
          WizardStyle=modern

          [Files]
          Source: "dist\Only4BMS\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\Only4BMS"; Filename: "{app}\Only4BMS.exe"
          Name: "{userdesktop}\Only4BMS"; Filename: "{app}\Only4BMS.exe"

          [Run]
          Filename: "{app}\Only4BMS.exe"; Description: "{cm:LaunchProgram,Only4BMS}"; Flags: nowait postinstall skipifsilent
          "@
          $iss | Out-File -FilePath "install_script.iss" -Encoding utf8

          # Run Inno Setup Compiler (available on windows-latest)
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" install_script.iss

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Only4BMS-Windows-Installer
          path: dist/Only4BMS_Setup.exe

  release:
    name: Attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name != '')
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Only4BMS-Windows-Installer
          path: ./artifacts

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
          name: Only4BMS ${{ github.event.inputs.tag_name || github.ref_name }}
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
