name: Build Only4BMS Multi-Platform

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # 윈도우, 맥, 리눅스 환경 설정
        include:
          - os: windows-latest
            artifact_name: Only4BMS-Windows
            asset_name: Only4BMS-Win.exe
            executable_path: dist/Only4BMS.exe
          - os: macos-latest
            artifact_name: Only4BMS-MacOS
            asset_name: Only4BMS-Mac
            executable_path: dist/Only4BMS
          - os: ubuntu-latest
            artifact_name: Only4BMS-Linux
            asset_name: Only4BMS-Linux
            executable_path: dist/Only4BMS

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller pytest pytest-qt

      - name: Run Tests
        run: |
          pytest tests/
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy

      - name: Build with PyInstaller
        run: |
          pyinstaller Only4BMS.spec

      - name: Rename Executable for Platform
        shell: bash
        run: |
          mv ${{ matrix.executable_path }} dist/${{ matrix.asset_name }}

      - name: Upload Artifact Output
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
          name: Only4BMS ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
