name: Build Only4BMS Multi-Platform

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: Only4BMS-Windows
            asset_name: Only4BMS-Win.exe
            executable_path: dist/Only4BMS.exe
          - os: macos-latest
            artifact_name: Only4BMS-AppleSilicon
            asset_name: Only4BMS-Mac-ARM
            executable_path: dist/Only4BMS
          - os: macos-15-intel
            artifact_name: Only4BMS-IntelMac
            asset_name: Only4BMS-Mac-Intel
            executable_path: dist/Only4BMS

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller stable-baselines3 shimmy gymnasium torch

      - name: Train AI Models
        run: |
          python src/only4bms/ai/train.py

      - name: Build with PyInstaller
        shell: bash
        run: |
          # Define separator based on OS
          SEP=":"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then SEP=";"; fi

          pyinstaller --onefile \
                      --windowed \
                      --name Only4BMS \
                      --add-data "src/only4bms/ai/*.zip${SEP}only4bms/ai" \
                      --collect-all stable_baselines3 \
                      --collect-all torch \
                      --clean \
                      src/only4bms/main.py

      - name: Rename Executable for Platform
        shell: bash
        run: |
          mv ${{ matrix.executable_path }} dist/${{ matrix.asset_name }}

      - name: Upload Artifact Output
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
          name: Only4BMS ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
